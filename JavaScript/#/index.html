<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
<header class="header">
    <div class="container">
        <div class="mainCalk">
            <input id="area" class="textCalk" type="text">
            <div class="calk">
                <div class="calkItem">
                    <p class="calkItem__text">7</p>
                </div>

                <div class="calkItem">
                    <p class="calkItem__text">8</p>
                </div>

                <div class="calkItem">
                    <p class="calkItem__text">9</p>
                </div>

                <div class="calkItem">
                    <p class="calkItem__text">+</p>
                </div>


                <div class="calkItem">
                    <p class="calkItem__text">4</p>
                </div>

                <div class="calkItem">
                    <p class="calkItem__text">5</p>

                <div class="calkItem">
                    <p class="calkItem__text">6</p>
                </div>

                <div class="calkItem">
                    <p class="calkItem__text">-</p>
                </div>


                <div class="calkItem">
                    <p class="calkItem__text">1</p>
                </div>

                <div class="calkItem">
                    <p class="calkItem__text">2</p>
                </div>

                <div class="calkItem">
                    <p class="calkItem__text">3</p>
                </div>

                <div class="calkItem">
                    <p class="calkItem__text">*</p>
                </div>


                <div class="calkItem">
                    <p class="calkItem__text">0</p>
                </div>

                <div class="calkItem">
                    <p id="ravno" class="calkItem__text">=</p>
                </div>

                <div class="calkItem">
                    <p class="calkItem__text">/</p>
                </div>

            </div>
        </div>
    </div>

<script src="js/main.js"></script>

</html>
