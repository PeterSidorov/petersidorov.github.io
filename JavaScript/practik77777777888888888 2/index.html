<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
<header class="header">
    <div class="container">
        <div class="box">
            <div class="infobox">
                <h1 style="margin-bottom: 20px">Мысль (значения)</h1>
                <p>Мышле́ние — это познавательная деятельность человека. Она является опосредованным и обобщённым способом отражения действительности с точки зрения марксизма. Результатом мышления является мысль.</p>

            </div>
            <div class="inline"></div>
            <div id="fullComent" class="fullComent">
                <div class="comentsBox">
                    <p class="nameUser">Anton</p>
                    <p class="dateUser">18 09 2008</p>
                    <p class="coment">La la la</p>
                </div>
            </div>
            <div class="inline"></div>
            <div class="boxComent">
                <h3>leave you comment</h3>
                <label for="username">Name:</label> <input style="margin: 10px 0" type="text" id="username"/>
                <label style="display: block" for="textAreaUser">Comment:</label>
                <textarea id="textAreaUser" style="display: block; width: 100%" rows="5"></textarea>
                <button id="userBtn" style="margin-top: 10px" type="button" class="btn">Add comment</button>
            </div>
        </div>
    </div>

</header>

<script src="js/main.js"></script>
</body>
</html>
