<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
<header class="header">
    <div class="container">
        <h1 style="text-align: center; border-bottom: 1px solid black">PAINT</h1>

        <div class="menu" style="display: flex; border-bottom: 1px solid;  justify-content: space-between; padding: 20px 0 20px 0;">
            <div class="item-menu">
                <input type="radio" value="square" name="f">
                <div class="square"></div>
            </div>
            <div class="item-menu">
                <input type="radio" value="circle" name="f">
                <div class="circle"></div>
            </div>
            <div class="item-menu">
                <input type="radio" value="rhombus" name="f">
                <div class="rhombus"></div>
            </div>
            <div class="item-menu">
                <input type="radio" value="triangle" name="f">
                <div class="triangle"></div>
            </div>

            <div class="boxes">
                <div class="box" data-color="black"></div>
                <div class="box" data-color="gray"></div>
                <div class="box" data-color="darkred"></div>
                <div class="box" data-color="red"></div>
                <div class="box" data-color="yellow"></div>
                <div class="box" data-color="green"></div>
                <div class="box" data-color="cyan"></div>
                <div class="box" data-color="blue"></div>
                <div class="box" data-color="purple"></div>
                <div class="box" data-color="white"></div>
                <div class="box" data-color="lightgray"></div>
                <div class="box" data-color="brown"></div>
                <div class="box" data-color="pink"></div>
                <div class="box" data-color="beige"></div>
                <div class="box" data-color="lightgreen"></div>
                <div class="box" data-color="lightblue"></div>
                <div class="box" data-color="cadetblue"></div>
                <div class="box" data-color="lavender"></div>
            </div>
        </div>
    </div>
</header>
<section class="can">
    <div class="container">
        <canvas id="canvasMain" style="display: block">777</canvas>
    </div>
</section>


<script src="main.js"></script>
</body>
</html>
