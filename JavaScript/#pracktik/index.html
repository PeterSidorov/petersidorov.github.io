<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
<input type="text" id="city" placeholder="Введите город">
<button id="btn" class="btn">Получить погоду</button>

<table>
    <tbody id="weatherData">
    <tr>
        <td>Координаты</td>
        <td id="coordinates"></td>
    </tr>
    <tr>
        <td>Температура</td>
        <td id="temperature"></td>
    </tr>
    <tr>
        <td>Ощущается как</td>
        <td id="feelsLike"></td>
    </tr>
    <tr>
        <td>Давление</td>
        <td id="pressure"></td>
    </tr>
    <tr>
        <td>Влажность</td>
        <td id="humidity"></td>
    </tr>
    <tr>
        <td>Скорость ветра</td>
        <td id="windSpeed"></td>
    </tr>
    <tr>
        <td>Направление ветра</td>
        <td id="windDirection"></td>
    </tr>
    <tr>
        <td>Порыв ветра</td>
        <td id="windGust"></td>
    </tr>
    <tr>
        <td>Облачность</td>
        <td id="cloudiness"></td>
    </tr>
    <tr>
        <td>Дождь</td>
        <td id="rain"></td>
    </tr>
    </tbody>
</table>
<script src="js/main.js"></script>
</body>
</html>
