<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
<header class="header">
    <div class="container">
        <div class="formMain">
            <div class="menu">
                <input class="search" type="text" placeholder="Search login">
                <button class="btn" type="button">Start</button>
            </div>

            <div class="bottomForm">
                <div class="bottomFormLeft">
                    <div class="imgBody">

                    </div>
                    <div class="formItem">
                        <p class="staticText">Name:</p>
                        <p class="runText name">gggg</p>
                    </div>

                    <div class="formItem">
                        <p class="staticText">Login:</p>
                        <p class="runText login">gggg</p>
                    </div>
                </div>
                <div class="bottomFormRight">

                    <div class="formItem">
                        <p class="staticText">Url to github:</p>
                        <p class="runText urlGithub">gggg</p>
                    </div>

                    <div class="formItem">
                        <p class="staticText">Blog:</p>
                        <p class="runText blog">gggg</p>
                    </div>

                    <div class="formItem">
                        <p class="staticText">City:</p>
                        <p class="runText city">gggg</p>
                    </div>

                    <div class="formItem">
                        <p class="staticText">Email:</p>
                        <p class="runText email">gggg</p>
                    </div>

                    <div class="formItemLast">

                        <div class="formItem">
                            <p class="staticText">Followers:</p>
                            <p class="runText followers">gggg</p>
                        </div>

                        <div class="formItem">
                            <p class="staticText">Following:</p>
                            <p class="runText following">gggg</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</header>
<section class="blocks">
    <div class="container">
        <div class="blocks3" style="display: flex">
            <div class="green g" data-info="green"></div>
            <div class="orange g" data-info="orange"></div>
            <div class="red g" data-info="red"></div>
        </div>
        <div class="style2 g" data-info="grey"></div>
    </div>
</section>
<script src="js/main.js"></script>
</body>
</html>
