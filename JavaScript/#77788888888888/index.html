<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
<header class="header">
    <div class="container containerTable">
        <table>
            <thead>
            <tr>
                <th id="firstname" class="item">Firstname</th>
                <th id="lastname" class="item">Lastname</th>
                <th id="age" class="item">Age</th>
                <th id="company" class="item">Company</th>
            </tr>
            </thead>
            <tr>
                <td class="firstname item">Mark</td>
                <td class="lastname item">Zuckerberg</td>
                <td class="age item">34</td>
                <td class="company item">Facebook</td>
            </tr>
            <tr>
                <td class="firstname item">Larry</td>
                <td class="lastname item">Page</td>
                <td class="age item">45</td>
                <td class="company item">Google</td>
            </tr>
            <tr>
                <td class="firstname item">Timothy</td>
                <td class="lastname item">Cook</td>
                <td class="age item">57</td>
                <td class="company item">Apple</td>
            </tr>
            <tr>
                <td class="firstname item">Bill</td>
                <td class="lastname item">Cates</td>
                <td class="age item">62</td>
                <td class="company item">Microsoft</td>
            </tr>
        </table>
    </div>
</header>
<script src="js/main.js"></script>
</body>
</html>
